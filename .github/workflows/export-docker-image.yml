name: Export Docker Image (Legacy tar)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.0) – leave empty to skip release'
        required: false
        default: ''

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and export Docker image (linux/amd64 only)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          # Output the image directly as a legacy Docker tar file
          outputs: type=docker,dest=deepseek-free-api.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-free-api-docker-legacy
          path: deepseek-free-api.tar

      - name: Create Release (optional – triggered only if version is provided)
        if: ${{ github.event.inputs.version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Docker Export v${{ github.event.inputs.version }}
          files: deepseek-free-api.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
