name: Export Docker Image and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.2.0)'
        required: true
        default: '1.2.0'

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image from GHCR
        run: docker pull ghcr.io/pouyafakhari/deepseek-free-api:latest

      - name: Save Docker image to tar
        run: docker save -o deepseek-free-api.tar ghcr.io/pouyafakhari/deepseek-free-api:latest

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Docker Export v${{ github.event.inputs.version }}
          files: deepseek-free-api.tar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
