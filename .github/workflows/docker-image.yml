  build-native:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Prepare artifact
        run: |
          mkdir artifact
          cp -r dist node_modules package.json .env.example public configs src artifact/ 2>/dev/null || true
          echo 'DEEP_SEEK_CHAT_AUTHORIZATION=YOUR_TOKEN_HERE' > artifact/.env

      - name: Upload native build
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-free-api-native
          path: artifact/
